name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-iso:
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name || github.sha }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'nix/**', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: Build ISO
        run: nix build .#iso --print-build-logs

      - name: Stage artifact + checksum
        run: |
          iso=$(readlink -f result/iso/karaoke-installer.iso)
          cp "$iso" karaoke-installer.iso
          sha256sum karaoke-installer.iso > karaoke-installer.iso.sha256

      - name: Upload workflow artifact
        if: ${{ !needs.release-please.outputs.release_created }}
        uses: actions/upload-artifact@v4
        with:
          name: karaoke-installer-iso
          path: |
            karaoke-installer.iso
            karaoke-installer.iso.sha256
          retention-days: 14

      - name: Attach to GitHub Release
        if: ${{ needs.release-please.outputs.release_created }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            karaoke-installer.iso
            karaoke-installer.iso.sha256
