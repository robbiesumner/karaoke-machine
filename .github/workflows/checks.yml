name: Checks

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  pull-requests: read

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            nix
            docs
            chore
            ci
            refactor
            test
            build
            perf
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            PR title subject must start lowercase and not end with a period.
            Example: "feat(audio): split SingStar mics into two PipeWire sources"

  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'nix/**', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: nix fmt --check
        run: nix fmt -- --check .

      - name: nix flake check
        run: nix flake check --print-build-logs --no-build
