name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            nix
            docs
            chore
            ci
            refactor
            test
            build
            perf
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            PR title subject must start lowercase and not end with a period.
            Example: "feat(audio): split SingStar mics into two PipeWire sources"
