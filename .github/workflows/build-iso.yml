name: build-iso

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build hybrid ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Check buildable
        id: gate
        shell: bash
        run: |
          if [[ -x scripts/build-iso.sh && -d iso ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::scripts/build-iso.sh or iso/ missing — ISO build skipped."
          fi

      - name: Build ISO
        if: steps.gate.outputs.ready == 'true'
        run: ./scripts/build-iso.sh

      - name: Take ownership of build artifacts
        if: steps.gate.outputs.ready == 'true'
        run: sudo chown -R "$USER":"$USER" build/

      - name: Upload ISO artifact
        if: steps.gate.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: karaoke-machine-iso-${{ github.sha }}
          path: |
            build/karaoke-machine-*.iso
            build/karaoke-machine-*.iso.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: steps.gate.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/karaoke-machine-*.iso
            build/karaoke-machine-*.iso.sha256
          fail_on_unmatched_files: true
